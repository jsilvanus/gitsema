<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gitsema — Embedding Space Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1rem; color: #58a6ff; }
  header span { font-size: 0.8rem; color: #8b949e; }
  #controls { padding: 8px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  #controls label { font-size: 0.8rem; color: #8b949e; }
  #controls input, #controls select { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
  #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
  canvas { width: 100%; height: 100%; cursor: crosshair; }
  #tooltip { position: absolute; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 0.75rem; pointer-events: none; display: none; max-width: 320px; word-break: break-all; z-index: 10; }
  #status { padding: 6px 20px; font-size: 0.75rem; color: #8b949e; background: #161b22; border-top: 1px solid #30363d; }
  .loader { display: inline-block; width: 12px; height: 12px; border: 2px solid #58a6ff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>gitsema — Embedding Space Explorer</h1>
  <span id="count-label">Loading…</span>
</header>
<div id="controls">
  <label>Model: <select id="model-select"><option value="">default</option></select></label>
  <label>Color by: <select id="color-select">
    <option value="path">Path prefix</option>
    <option value="score">Relevance</option>
  </select></label>
  <label>Point size: <input id="point-size" type="range" min="1" max="8" value="3" style="width:80px"></label>
  <label>Search: <input id="search-input" type="text" placeholder="highlight matching paths…" style="width:180px"></label>
  <button id="refresh-btn" style="background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.8rem">↻ Reload</button>
</div>
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="tooltip"></div>
</div>
<div id="status"><span class="loader"></span> Fetching projections…</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const status = document.getElementById('status');
const countLabel = document.getElementById('count-label');
const searchInput = document.getElementById('search-input');
const refreshBtn = document.getElementById('refresh-btn');
const pointSizeSlider = document.getElementById('point-size');

let points = [];
let paths = {};
let transform = { x: 0, y: 0, scale: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0 };
let lastTransform = { x: 0, y: 0 };

function resize() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  draw();
}

function worldToScreen(wx, wy) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: cx + (wx * canvas.width * 0.45 + transform.x) * transform.scale,
    y: cy + (wy * canvas.height * 0.45 + transform.y) * transform.scale,
  };
}

function screenToWorld(sx, sy) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: ((sx - cx) / transform.scale - transform.x) / (canvas.width * 0.45),
    y: ((sy - cy) / transform.scale - transform.y) / (canvas.height * 0.45),
  };
}

const PALETTE = ['#58a6ff','#f78166','#56d364','#e3b341','#a371f7','#39d353','#ff7b72','#79c0ff','#d2a8ff','#ffa657'];
const prefixColors = {};
let prefixIdx = 0;

function getColor(hash) {
  const pathArr = paths[hash] || [];
  const p = (pathArr[0] || '').split('/')[0] || 'unknown';
  if (!prefixColors[p]) prefixColors[p] = PALETTE[prefixIdx++ % PALETTE.length];
  return prefixColors[p];
}

function draw() {
  if (!canvas.width) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const ptSize = parseInt(pointSizeSlider.value) * devicePixelRatio;
  const filter = searchInput.value.toLowerCase().trim();

  for (const pt of points) {
    const { x, y } = worldToScreen(pt.x, pt.y);
    if (x < -ptSize || y < -ptSize || x > canvas.width + ptSize || y > canvas.height + ptSize) continue;
    const col = getColor(pt.blobHash);
    const pathArr = paths[pt.blobHash] || [];
    const pathStr = (pathArr[0] || '').toLowerCase();
    const highlighted = filter && pathStr.includes(filter);
    const dimmed = filter && !highlighted;
    ctx.globalAlpha = dimmed ? 0.15 : (highlighted ? 1 : 0.65);
    ctx.fillStyle = highlighted ? '#fff' : col;
    ctx.beginPath();
    ctx.arc(x, y, highlighted ? ptSize * 1.8 : ptSize, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

async function loadData(model) {
  status.innerHTML = '<span class="loader"></span> Loading projections…';
  try {
    const url = model ? `/api/v1/projections?model=${encodeURIComponent(model)}` : '/api/v1/projections';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    points = data.points || [];
    paths = data.paths || {};
    countLabel.textContent = `${points.length} points`;
    status.textContent = `${points.length} embeddings projected. Pan: drag · Zoom: scroll`;
    draw();
  } catch (e) {
    status.textContent = `Error: ${e.message}. Run 'gitsema project' first.`;
  }
}

// Tooltip on hover
canvas.addEventListener('mousemove', (e) => {
  if (dragging) {
    transform.x = lastTransform.x + (e.clientX - dragStart.x) / transform.scale;
    transform.y = lastTransform.y + (e.clientY - dragStart.y) / transform.scale;
    draw();
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * devicePixelRatio;
  const sy = (e.clientY - rect.top) * devicePixelRatio;
  const ptSize = parseInt(pointSizeSlider.value) * devicePixelRatio * 2;
  let nearest = null;
  let nearestDist = ptSize;
  for (const pt of points) {
    const { x, y } = worldToScreen(pt.x, pt.y);
    const d = Math.hypot(sx - x, sy - y);
    if (d < nearestDist) { nearestDist = d; nearest = pt; }
  }
  if (nearest) {
    const pathArr = paths[nearest.blobHash] || [];
    tooltip.innerHTML = `<strong>${nearest.blobHash.slice(0,8)}</strong><br>${pathArr.slice(0,3).join('<br>') || '(unknown path)'}`;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  lastTransform = { x: transform.x, y: transform.y };
});
canvas.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  transform.scale = Math.max(0.1, Math.min(50, transform.scale * factor));
  draw();
}, { passive: false });

searchInput.addEventListener('input', draw);
pointSizeSlider.addEventListener('input', draw);
document.getElementById('color-select').addEventListener('change', draw);
refreshBtn.addEventListener('click', () => loadData(document.getElementById('model-select').value));

window.addEventListener('resize', resize);
resize();
loadData('');
</script>
</body>
</html>
