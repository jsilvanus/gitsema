name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # changesets action pushes the Version Packages branch
  pull-requests: write  # ...and opens/updates the Version Packages PR
  id-token: write       # OIDC trusted publishing to npm

concurrency: release-${{ github.ref }}

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    name: Version or publish via changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create Version Packages PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
