name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish after tests
        required: false
        default: "false"

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: >
      (github.event_name == push && startsWith(github.ref, refs/tags/)) || (github.event_name == workflow_dispatch && github.event.inputs.publish == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build --if-present

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: npm publish --access public
